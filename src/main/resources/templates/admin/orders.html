<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Order Management')}"></head>
<body class="admin-theme">
<div th:replace="~{fragments/header :: siteHeader('admin')}"></div>

<main class="section-shell">
    <div class="site-shell">
        <section class="panel reveal">
            <div class="section-heading compact">
                <span class="eyebrow">Member 4</span>
                <h1>Order Management</h1>
            </div>
            <form method="get" th:action="@{/admin/orders}" class="search-panel inline">
                <label class="wide-input">
                    Search orders
                    <input type="text" name="query" th:value="${query}" placeholder="Order number, customer name, email">
                </label>
                <label>
                    Status
                    <select name="status">
                        <option value="">All statuses</option>
                        <option th:each="statusOption : ${statusOptions}"
                                th:value="${statusOption.name()}"
                                th:text="${statusOption.name()}"
                                th:selected="${statusOption.name() == selectedStatus}">Status</option>
                    </select>
                </label>
                <button class="primary-btn" type="submit">Filter</button>
            </form>
        </section>

        <section class="order-list">
            <article class="panel order-card reveal" th:each="order : ${orders}">
                <div class="order-topline">
                    <div>
                        <span class="eyebrow" th:text="${order.orderNumber}">ORD-000</span>
                        <h2 th:text="${order.customerName}">Customer</h2>
                        <p class="muted" th:text="${order.customerEmail}">Email</p>
                    </div>
                    <span class="status-chip" th:classappend="${order.statusTone}" th:text="${order.status}">PENDING</span>
                </div>

                <div class="order-items">
                    <div th:each="item : ${order.items}" class="order-item-line">
                        <span th:text="${item.title} + ' x ' + ${item.quantity}">Title x qty</span>
                        <strong th:text="${#numbers.formatDecimal(item.lineTotal, 1, 2)} + ' USD'">0.00 USD</strong>
                    </div>
                </div>

                <div class="summary-row">
                    <span>Shipping</span>
                    <strong th:text="${order.shippingAddress}">Address</strong>
                </div>
                <div class="summary-row">
                    <span>Total</span>
                    <strong th:text="${#numbers.formatDecimal(order.grandTotal, 1, 2)} + ' USD'">0.00 USD</strong>
                </div>

                <div class="action-row">
                    <form th:action="@{'/admin/orders/' + ${order.id} + '/status'}" method="post" class="inline-form">
                        <select name="status">
                            <option th:each="statusOption : ${statusOptions}"
                                    th:value="${statusOption.name()}"
                                    th:text="${statusOption.name()}"
                                    th:selected="${statusOption == order.status}">Status</option>
                        </select>
                        <button class="primary-btn compact" type="submit">Update</button>
                    </form>

                    <form th:action="@{'/admin/orders/' + ${order.id} + '/delete'}" method="post">
                        <button class="danger-btn compact" type="submit">Delete</button>
                    </form>
                </div>
            </article>
        </section>
    </div>
</main>

<div th:replace="~{fragments/alerts :: flashMessages}"></div>
<div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
